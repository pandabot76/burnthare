<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BurntHare Admin Portal</title>
<style>
  :root {
    --orange: #FF4D00;
    --orange-dark: #CC3D00;
    --grey: #808080;
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface-2: #242424;
    --surface-3: #2e2e2e;
    --border: #333;
    --border-light: #3d3d3d;
    --text: #f0f0f0;
    --text-muted: #888;
    --text-dim: #555;
    --radius: 8px;
    --radius-sm: 5px;
    --green: #22c55e;
    --red: #ef4444;
    --partner-accent: #60a5fa;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Top bar ── */
  .topbar {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 32px; height: 60px;
  }
  .topbar-logo { display: flex; align-items: center; gap: 12px; }
  .logo-mark {
    width: 36px; height: 36px; background: var(--orange); border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 14px; letter-spacing: -1px; color: white;
  }
  .topbar h1 { font-size: 15px; font-weight: 700; color: var(--text); }
  .topbar-sub { font-size: 12px; color: var(--text-muted); }

  .tab-bar { display: flex; gap: 4px; }
  .tab {
    padding: 7px 18px; border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 600; cursor: pointer; border: none;
    background: transparent; color: var(--text-muted); transition: all .15s;
  }
  .tab:hover { color: var(--text); background: var(--surface-3); }
  .tab.active { background: var(--orange); color: white; }
  .tab.partner { }
  .tab.active.partner { background: var(--partner-accent); color: #0f172a; }

  /* ── Layout ── */
  .layout { display: flex; height: calc(100vh - 60px); }

  /* ── Sidebar ── */
  .sidebar {
    width: 260px; flex-shrink: 0;
    border-right: 1px solid var(--border);
    background: var(--surface);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 16px 16px 12px;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .sidebar-header span { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em; }
  .sidebar-list { flex: 1; overflow-y: auto; padding: 8px; }
  .event-item {
    padding: 10px 12px; border-radius: var(--radius-sm);
    cursor: pointer; transition: background .1s;
    border: 1px solid transparent; margin-bottom: 3px;
  }
  .event-item:hover { background: var(--surface-2); }
  .event-item.active { background: var(--surface-3); border-color: var(--border-light); }
  .event-item-name { font-size: 13px; font-weight: 600; line-height: 1.3; }
  .event-item-date { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .event-item-badge {
    display: inline-block; font-size: 10px; font-weight: 700;
    padding: 1px 7px; border-radius: 10px; margin-top: 4px;
    background: rgba(255,77,0,.15); color: var(--orange); text-transform: uppercase;
  }
  .event-item-badge.partner { background: rgba(96,165,250,.15); color: var(--partner-accent); }
  .event-item-badge.upcoming { background: rgba(34,197,94,.1); color: var(--green); }
  .empty-sidebar { text-align: center; padding: 40px 20px; color: var(--text-dim); font-size: 13px; }

  /* ── Editor panel ── */
  .editor { flex: 1; overflow-y: auto; }
  .editor-inner { max-width: 820px; padding: 32px 40px; margin: 0 auto; }
  .editor-placeholder {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; color: var(--text-dim); gap: 12px;
  }
  .editor-placeholder svg { opacity: .2; }
  .editor-placeholder p { font-size: 14px; }

  /* ── Section headings ── */
  .section { margin-bottom: 36px; }
  .section-title {
    font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em;
    color: var(--text-muted); margin-bottom: 16px; padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }
  .section-title .dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--orange);
  }
  .section-title .dot.partner-dot { background: var(--partner-accent); }

  /* ── Form elements ── */
  .field { margin-bottom: 16px; }
  .field label {
    display: block; font-size: 12px; font-weight: 600;
    color: var(--text-muted); margin-bottom: 6px;
  }
  .field label .req { color: var(--orange); margin-left: 2px; }
  .field label .hint {
    font-weight: 400; color: var(--text-dim); font-size: 11px; margin-left: 4px;
  }
  input[type=text], input[type=date], input[type=time], input[type=url],
  textarea, select {
    width: 100%; padding: 9px 12px;
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text); font-size: 13px;
    font-family: inherit; transition: border-color .15s; outline: none;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--orange); }
  textarea { resize: vertical; min-height: 90px; line-height: 1.5; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .field-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

  /* ── List fields (rules / prizes / notes) ── */
  .list-field { display: flex; flex-direction: column; gap: 6px; }
  .list-item { display: flex; gap: 8px; align-items: flex-start; }
  .list-item input { flex: 1; }
  .icon-btn {
    width: 32px; height: 32px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    border: none; border-radius: var(--radius-sm); cursor: pointer;
    font-size: 16px; line-height: 1; transition: background .1s;
  }
  .icon-btn.remove { background: rgba(239,68,68,.12); color: var(--red); }
  .icon-btn.remove:hover { background: rgba(239,68,68,.25); }
  .icon-btn.add { background: var(--surface-3); color: var(--text-muted); }
  .icon-btn.add:hover { background: var(--border-light); color: var(--text); }
  .add-row { margin-top: 4px; }
  .add-row button {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; font-weight: 600; color: var(--text-muted);
    background: none; border: 1px dashed var(--border); border-radius: var(--radius-sm);
    padding: 6px 14px; cursor: pointer; transition: all .15s; width: 100%;
    justify-content: center;
  }
  .add-row button:hover { border-color: var(--orange); color: var(--orange); }

  /* ── Race sub-cards ── */
  .race-card {
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px; margin-bottom: 10px; position: relative;
  }
  .race-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .race-card-num { font-size: 11px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; }
  .race-remove { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 18px; line-height: 1; transition: color .1s; }
  .race-remove:hover { color: var(--red); }

  /* ── Course map cards ── */
  .map-card {
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px; margin-bottom: 8px;
    display: flex; gap: 12px; align-items: flex-start;
  }
  .map-card .field { flex: 1; margin-bottom: 0; }

  /* ── Action bar ── */
  .action-bar {
    position: sticky; bottom: 0;
    background: var(--surface); border-top: 1px solid var(--border);
    padding: 14px 40px; display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
  }
  .action-bar-left { display: flex; gap: 10px; align-items: center; }
  .btn {
    padding: 9px 20px; border-radius: var(--radius-sm); font-size: 13px;
    font-weight: 700; cursor: pointer; border: none; transition: all .15s; display: flex; align-items: center; gap: 7px;
  }
  .btn-primary { background: var(--orange); color: white; }
  .btn-primary:hover { background: var(--orange-dark); }
  .btn-danger { background: rgba(239,68,68,.12); color: var(--red); border: 1px solid rgba(239,68,68,.25); }
  .btn-danger:hover { background: rgba(239,68,68,.22); }
  .btn-ghost { background: var(--surface-3); color: var(--text-muted); }
  .btn-ghost:hover { background: var(--border-light); color: var(--text); }
  .btn-new { background: var(--surface-3); color: var(--text); }
  .btn-new:hover { background: var(--border-light); }

  /* ── Save status ── */
  .save-status { font-size: 12px; color: var(--text-dim); }
  .save-status.ok { color: var(--green); }
  .save-status.err { color: var(--red); }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 80px; right: 28px; z-index: 200;
    background: var(--surface-3); border: 1px solid var(--border-light);
    border-radius: var(--radius); padding: 12px 18px;
    font-size: 13px; font-weight: 600; color: var(--text);
    opacity: 0; transform: translateY(8px);
    transition: opacity .2s, transform .2s; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: none; }
  .toast.ok { border-left: 3px solid var(--green); }
  .toast.err { border-left: 3px solid var(--red); }

  /* ── How to use panel ── */
  .how-to {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px 24px; margin-bottom: 28px;
  }
  .how-to h3 { font-size: 13px; font-weight: 700; color: var(--orange); margin-bottom: 10px; }
  .how-to ol { padding-left: 18px; color: var(--text-muted); font-size: 12px; line-height: 1.9; }
  .how-to code { background: var(--surface-3); padding: 1px 6px; border-radius: 3px; font-size: 11px; color: var(--text); }

  /* ── Raw JSON viewer ── */
  .raw-viewer {
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px; margin-top: 20px;
    overflow: auto; max-height: 320px;
  }
  .raw-viewer pre { font-size: 11px; line-height: 1.6; color: var(--text-muted); white-space: pre-wrap; }
  .raw-toggle {
    background: none; border: none; font-size: 12px; color: var(--text-dim);
    cursor: pointer; padding: 0; margin-top: 8px; display: block;
  }
  .raw-toggle:hover { color: var(--text-muted); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">
    <div class="logo-mark">BH</div>
    <div>
      <div style="font-size:15px;font-weight:700;color:var(--text)">BurntHare</div>
      <div class="topbar-sub">Event admin portal — runs locally only</div>
    </div>
  </div>
  <div class="tab-bar">
    <button class="tab active" id="tab-events" onclick="switchTab('events')">BurntHare Events</button>
    <button class="tab partner" id="tab-partners" onclick="switchTab('partners')">Partner Events</button>
  </div>
</div>

<div class="layout">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span id="sidebar-label">Events</span>
      <button class="btn btn-new" style="padding:5px 12px;font-size:12px" onclick="newEvent()">+ New</button>
    </div>
    <div class="sidebar-list" id="sidebar-list"></div>
  </div>

  <div class="editor" id="editor">
    <div class="editor-placeholder" id="placeholder">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/>
      </svg>
      <p>Select an event to edit, or create a new one</p>
    </div>
    <div id="form-wrapper" style="display:none">
      <div class="editor-inner" id="form-area"></div>
      <div class="action-bar">
        <div class="action-bar-left">
          <button class="btn btn-primary" onclick="saveEvent()">💾 Save &amp; download</button>
          <button class="btn btn-ghost" onclick="copyEvent()">📋 Copy as new</button>
          <button class="btn btn-ghost" onclick="downloadAll()">⬇ Export all</button>
          <button class="btn btn-danger" onclick="deleteEvent()">🗑 Delete</button>
        </div>
        <span class="save-status" id="save-status"></span>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ────────────────────────────────────────────────
// State
// ────────────────────────────────────────────────
let tab = 'events'
let eventsData = []
let partnersData = []
let currentIdx = null

// ────────────────────────────────────────────────
// Init — load JSON files via fetch (works when
// the HTML is served by a local server, e.g.
//   npx serve .  from the burnthare-site folder)
// ────────────────────────────────────────────────
async function loadData() {
  try {
    const [ev, pa] = await Promise.all([
      fetch('src/data/events.json').then(r => r.json()),
      fetch('src/data/partners.json').then(r => r.json()),
    ])
    eventsData = ev
    partnersData = pa
    renderSidebar()
  } catch(e) {
    showHowToPane()
  }
}

function showHowToPane() {
  document.getElementById('placeholder').innerHTML = `
    <div class="how-to" style="max-width:520px;text-align:left">
      <h3>⚠️ Cannot load JSON files</h3>
      <p style="font-size:13px;color:var(--text-muted);line-height:1.7;margin-bottom:14px">
        This portal needs to be served from the <code>burnthare-site</code> folder,
        not opened directly as a file. Run this once in your terminal:
      </p>
      <ol>
        <li>Open your terminal and go to the <code>burnthare-site</code> folder</li>
        <li>Run: <code>npx serve .</code></li>
        <li>Open the URL it gives you (e.g. <code>http://localhost:3000</code>)</li>
        <li>Navigate to <code>/admin.html</code></li>
      </ol>
      <p style="font-size:12px;color:var(--text-dim);margin-top:14px">
        Alternatively, if you already have the dev server running (<code>npm run dev</code>),
        visit <code>http://localhost:5173/admin.html</code>
      </p>
    </div>
  `
}

// ────────────────────────────────────────────────
// Tab switching
// ────────────────────────────────────────────────
function switchTab(t) {
  tab = t
  currentIdx = null
  document.getElementById('tab-events').classList.toggle('active', t === 'events')
  document.getElementById('tab-partners').classList.toggle('active', t === 'partners')
  document.getElementById('tab-events').classList.toggle('partner', false)
  document.getElementById('tab-partners').classList.toggle('partner', true)
  document.getElementById('sidebar-label').textContent = t === 'events' ? 'BurntHare Events' : 'Partner Events'
  document.getElementById('form-wrapper').style.display = 'none'
  document.getElementById('placeholder').style.display = 'flex'
  renderSidebar()
}

function currentList() {
  return tab === 'events' ? eventsData : partnersData
}

// ────────────────────────────────────────────────
// Sidebar
// ────────────────────────────────────────────────
function renderSidebar() {
  const list = currentList()
  const el = document.getElementById('sidebar-list')
  if (!list.length) {
    el.innerHTML = `<div class="empty-sidebar">No events yet.<br>Click + New to add one.</div>`
    return
  }
  el.innerHTML = list.map((ev, i) => {
    const daysUntil = Math.round((new Date(ev.date) - new Date()) / 86400000)
    const state = daysUntil >= 0 ? 'upcoming' : daysUntil >= -7 ? 'recent' : 'expired'
    const badgeText = state === 'upcoming' ? 'Upcoming' : state === 'recent' ? 'Recent' : 'Expired'
    const badgeClass = state === 'upcoming' ? 'upcoming' : state === 'recent' ? 'partner' : ''
    return `
      <div class="event-item${currentIdx === i ? ' active' : ''}" onclick="selectEvent(${i})">
        <div class="event-item-name">${ev.name || 'Untitled event'}</div>
        <div class="event-item-date">${ev.date || 'No date set'}</div>
        <span class="event-item-badge ${badgeClass}">${badgeText}</span>
        ${tab === 'partners' ? `<span class="event-item-badge partner" style="margin-left:4px">${ev.partner || 'Partner'}</span>` : ''}
      </div>
    `
  }).join('')
}

// ────────────────────────────────────────────────
// Select / New
// ────────────────────────────────────────────────
function selectEvent(i) {
  currentIdx = i
  renderSidebar()
  renderForm(currentList()[i])
}

function newEvent() {
  const blank = tab === 'events' ? blankEvent() : blankPartner()
  currentList().push(blank)
  currentIdx = currentList().length - 1
  renderSidebar()
  renderForm(blank)
}

function blankEvent() {
  return {
    id: '', name: '', date: '', startTime: '09:00', location: '', tagline: '',
    image: '', poster: '', bookingUrl: '', resultsUrl: '', summary: '',
    races: [], course: { description: '', maps: [] },
    registration: { feeNote: '', deadline: '', notes: [] },
    rules: [], prizes: [],
    locationDetails: { address: '', parking: '', mapQuery: '' }
  }
}

function blankPartner() {
  return {
    id: '', name: '', date: '', startTime: '09:00', location: '',
    tagline: '', image: '', bookingUrl: '', partner: ''
  }
}

// ────────────────────────────────────────────────
// Form rendering
// ────────────────────────────────────────────────
function renderForm(ev) {
  document.getElementById('placeholder').style.display = 'none'
  document.getElementById('form-wrapper').style.display = 'block'
  document.getElementById('save-status').textContent = ''
  const isPartner = tab === 'partners'
  const dotClass = isPartner ? 'dot partner-dot' : 'dot'

  let html = `
    <div class="how-to" style="margin-bottom:28px">
      <h3>${isPartner ? '🤝 Partner Event' : '🏃 BurntHare Event'}</h3>
      <p style="font-size:12px;color:var(--text-muted);line-height:1.7">
        ${isPartner
          ? 'Partner events appear in the carousel only. They link directly to the external booking page — no event page is created on the site.'
          : 'Fill in the core details first. All other sections are optional — leave them blank and they simply won\'t appear on the event page.'}
        After saving, <strong>copy</strong> the JSON output into <code>src/data/${isPartner ? 'partners' : 'events'}.json</code>.
      </p>
    </div>

    <div class="section">
      <div class="section-title"><span class="${dotClass}"></span> Core details</div>
      <div class="field-row">
        <div class="field">
          <label>Event name <span class="req">*</span></label>
          <input type="text" id="f-name" value="${esc(ev.name)}" placeholder="The Hitchin 10km" />
        </div>
        <div class="field">
          <label>URL-safe ID <span class="req">*</span> <span class="hint">lowercase-hyphens</span></label>
          <input type="text" id="f-id" value="${esc(ev.id)}" placeholder="hitchin-10k" />
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Date <span class="req">*</span></label>
          <input type="date" id="f-date" value="${esc(ev.date)}" />
        </div>
        <div class="field">
          <label>Start time</label>
          <input type="time" id="f-startTime" value="${esc(ev.startTime || '09:00')}" />
        </div>
      </div>
      <div class="field">
        <label>Location</label>
        <input type="text" id="f-location" value="${esc(ev.location)}" placeholder="Hitchin town centre, Hertfordshire" />
      </div>
      <div class="field">
        <label>Tagline <span class="hint">short one-liner for cards</span></label>
        <input type="text" id="f-tagline" value="${esc(ev.tagline)}" placeholder="10km road race + Children's Golden Mile" />
      </div>
    </div>

    <div class="section">
      <div class="section-title"><span class="${dotClass}"></span> Images & links</div>
      <div class="field-row">
        <div class="field">
          <label>Card image filename <span class="hint">in public/images/${isPartner ? 'partners' : 'events'}/</span></label>
          <input type="text" id="f-image" value="${esc(ev.image)}" placeholder="my-event.jpg" />
        </div>
        ${isPartner ? '' : `
        <div class="field">
          <label>Poster filename <span class="hint">leave blank to use card image</span></label>
          <input type="text" id="f-poster" value="${esc(ev.poster || '')}" placeholder="my-event-poster.jpg" />
        </div>`}
      </div>
      <div class="field-row">
        <div class="field">
          <label>Entry / booking URL <span class="req">*</span></label>
          <input type="url" id="f-bookingUrl" value="${esc(ev.bookingUrl)}" placeholder="https://my.raceresult.com/..." />
        </div>
        ${isPartner ? '' : `
        <div class="field">
          <label>Results URL</label>
          <input type="url" id="f-resultsUrl" value="${esc(ev.resultsUrl || '')}" placeholder="https://my.raceresult.com/.../results" />
        </div>`}
      </div>
      ${isPartner ? `
      <div class="field">
        <label>Organiser / partner name <span class="req">*</span></label>
        <input type="text" id="f-partner" value="${esc(ev.partner || '')}" placeholder="Hitchin Harriers AC" />
      </div>` : ''}
    </div>
  `

  if (!isPartner) {
    html += renderBurntHareSections(ev)
  }

  html += `
    <div class="section" style="margin-top:8px">
      <button class="raw-toggle" onclick="toggleRaw()">▶ Show generated JSON</button>
      <div id="raw-viewer" style="display:none" class="raw-viewer"><pre id="raw-pre"></pre></div>
    </div>
  `

  document.getElementById('form-area').innerHTML = html
  setupAutoId()
}

function renderBurntHareSections(ev) {
  const races = ev.races || []
  const maps = (ev.course && ev.course.maps) || []
  const notes = (ev.registration && ev.registration.notes) || []
  const rules = ev.rules || []
  const prizes = ev.prizes || []

  return `
    <div class="section">
      <div class="section-title"><span class="dot"></span> Event summary</div>
      <div class="field">
        <label>Summary paragraph <span class="hint">shown at the top of the event page</span></label>
        <textarea id="f-summary" rows="4" placeholder="A couple of sentences describing the event...">${esc(ev.summary || '')}</textarea>
      </div>
    </div>

    <div class="section">
      <div class="section-title"><span class="dot"></span> Races / distances</div>
      <div id="races-list">
        ${races.map((r, i) => raceCard(r, i)).join('')}
      </div>
      <div class="add-row">
        <button onclick="addRace()">+ Add distance</button>
      </div>
    </div>

    <div class="section">
      <div class="section-title"><span class="dot"></span> Course</div>
      <div class="field">
        <label>Course description</label>
        <textarea id="f-courseDesc" rows="3">${esc((ev.course && ev.course.description) || '')}</textarea>
      </div>
      <div class="field">
        <label>Course map images <span class="hint">filenames in public/images/course-maps/</span></label>
        <div id="maps-list">
          ${maps.map((m, i) => mapCard(m, i)).join('')}
        </div>
        <div class="add-row">
          <button onclick="addMap()">+ Add map image</button>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title"><span class="dot"></span> Registration</div>
      <div class="field-row">
        <div class="field">
          <label>Fees</label>
          <input type="text" id="f-feeNote" value="${esc((ev.registration && ev.registration.feeNote) || '')}" placeholder="£20 — see booking page" />
        </div>
        <div class="field">
          <label>Entry deadline</label>
          <input type="text" id="f-deadline" value="${esc((ev.registration && ev.registration.deadline) || '')}" placeholder="Online entries close Thursday..." />
        </div>
      </div>
      <div class="field">
        <label>Registration notes <span class="hint">one per row</span></label>
        <div class="list-field" id="notes-list">
          ${notes.map((n, i) => listItem('note', i, n)).join('')}
        </div>
        <div class="add-row"><button onclick="addListItem('note','notes-list')">+ Add note</button></div>
      </div>
    </div>

    <div class="section">
      <div class="section-title"><span class="dot"></span> Rules</div>
      <div class="list-field" id="rules-list">
        ${rules.map((r, i) => listItem('rule', i, r)).join('')}
      </div>
      <div class="add-row"><button onclick="addListItem('rule','rules-list')">+ Add rule</button></div>
    </div>

    <div class="section">
      <div class="section-title"><span class="dot"></span> Prizes, medals & t-shirts</div>
      <div class="list-field" id="prizes-list">
        ${prizes.map((p, i) => listItem('prize', i, p)).join('')}
      </div>
      <div class="add-row"><button onclick="addListItem('prize','prizes-list')">+ Add prize/medal line</button></div>
    </div>

    <div class="section">
      <div class="section-title"><span class="dot"></span> Location & directions</div>
      <div class="field">
        <label>Full address</label>
        <input type="text" id="f-address" value="${esc((ev.locationDetails && ev.locationDetails.address) || '')}" placeholder="Hitchin town centre, SG5 1AY" />
      </div>
      <div class="field">
        <label>Parking / getting there</label>
        <textarea id="f-parking" rows="3">${esc((ev.locationDetails && ev.locationDetails.parking) || '')}</textarea>
      </div>
      <div class="field">
        <label>Map search query <span class="hint">exactly as you'd type it into Google Maps</span></label>
        <input type="text" id="f-mapQuery" value="${esc((ev.locationDetails && ev.locationDetails.mapQuery) || '')}" placeholder="Hitchin High Street, Hitchin" />
      </div>
    </div>
  `
}

function raceCard(r, i) {
  return `
    <div class="race-card" id="race-${i}">
      <div class="race-card-header">
        <span class="race-card-num">Distance ${i + 1}</span>
        <button class="race-remove" onclick="removeRace(${i})" title="Remove">×</button>
      </div>
      <div class="field-row-3">
        <div class="field" style="margin-bottom:0">
          <label>Name</label>
          <input type="text" data-race="${i}" data-key="name" value="${esc(r.name)}" placeholder="The Sprint" />
        </div>
        <div class="field" style="margin-bottom:0">
          <label>Distance</label>
          <input type="text" data-race="${i}" data-key="distance" value="${esc(r.distance)}" placeholder="400m swim · 20km bike · 5km run" />
        </div>
        <div class="field" style="margin-bottom:0">
          <label>Age group</label>
          <input type="text" data-race="${i}" data-key="ages" value="${esc(r.ages)}" placeholder="16+" />
        </div>
      </div>
    </div>
  `
}

function mapCard(m, i) {
  return `
    <div class="map-card" id="map-${i}">
      <div class="field" style="flex:2;margin-bottom:0">
        <label>Label</label>
        <input type="text" data-map="${i}" data-key="label" value="${esc(m.label)}" placeholder="Sprint bike route — 20.3km" />
      </div>
      <div class="field" style="flex:2;margin-bottom:0">
        <label>Image filename</label>
        <input type="text" data-map="${i}" data-key="image" value="${esc(m.image)}" placeholder="triathlon-bike-sprint.jpg" />
      </div>
      <button class="race-remove" style="margin-top:20px" onclick="removeMap(${i})" title="Remove">×</button>
    </div>
  `
}

function listItem(type, i, val) {
  return `
    <div class="list-item" id="${type}-${i}">
      <input type="text" data-listtype="${type}" data-idx="${i}" value="${esc(val)}" placeholder="Enter a ${type}..." />
      <button class="icon-btn remove" onclick="removeListItem('${type}',${i},'${type}-list')" title="Remove">−</button>
    </div>
  `
}

// ────────────────────────────────────────────────
// Dynamic list actions
// ────────────────────────────────────────────────
function addRace() {
  const ev = currentList()[currentIdx]
  if (!ev.races) ev.races = []
  ev.races.push({ name: '', distance: '', ages: '' })
  const list = document.getElementById('races-list')
  const i = ev.races.length - 1
  list.insertAdjacentHTML('beforeend', raceCard(ev.races[i], i))
}
function removeRace(i) {
  const ev = currentList()[currentIdx]
  ev.races.splice(i, 1)
  document.getElementById('race-' + i).remove()
  // Re-index remaining race inputs
  document.querySelectorAll('[data-race]').forEach(el => {
    const idx = parseInt(el.closest('[id^=race-]').id.split('-')[1])
    el.dataset.race = idx
  })
}

function addMap() {
  const ev = currentList()[currentIdx]
  if (!ev.course) ev.course = { description: '', maps: [] }
  if (!ev.course.maps) ev.course.maps = []
  ev.course.maps.push({ label: '', image: '' })
  const list = document.getElementById('maps-list')
  const i = ev.course.maps.length - 1
  list.insertAdjacentHTML('beforeend', mapCard(ev.course.maps[i], i))
}
function removeMap(i) {
  document.getElementById('map-' + i).remove()
}

function addListItem(type, listId) {
  const list = document.getElementById(listId)
  const count = list.querySelectorAll('.list-item').length
  list.insertAdjacentHTML('beforeend', listItem(type, count, ''))
}
function removeListItem(type, i, listId) {
  document.getElementById(type + '-' + i).remove()
}

// ────────────────────────────────────────────────
// Auto-generate ID from name
// ────────────────────────────────────────────────
function setupAutoId() {
  const nameEl = document.getElementById('f-name')
  const idEl = document.getElementById('f-id')
  if (!nameEl || !idEl) return
  nameEl.addEventListener('input', () => {
    if (!idEl.value || idEl.dataset.manualEdit !== 'true') {
      idEl.value = nameEl.value.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/-+$/,'')
    }
  })
  idEl.addEventListener('input', () => { idEl.dataset.manualEdit = 'true' })
}

// ────────────────────────────────────────────────
// Collect form values into object
// ────────────────────────────────────────────────
function collectForm() {
  const isPartner = tab === 'partners'
  const v = (id) => (document.getElementById(id) || {}).value || ''

  const base = {
    id: v('f-id'),
    name: v('f-name'),
    date: v('f-date'),
    startTime: v('f-startTime') || '09:00',
    location: v('f-location'),
    tagline: v('f-tagline'),
    image: v('f-image'),
    bookingUrl: v('f-bookingUrl'),
  }

  if (isPartner) {
    return { ...base, partner: v('f-partner') }
  }

  // Collect races
  const races = []
  document.querySelectorAll('[id^=race-]').forEach(card => {
    const race = {}
    card.querySelectorAll('[data-key]').forEach(el => { race[el.dataset.key] = el.value })
    if (race.name || race.distance) races.push(race)
  })

  // Collect course maps
  const maps = []
  document.querySelectorAll('[id^=map-]').forEach(card => {
    const map = {}
    card.querySelectorAll('[data-key]').forEach(el => { map[el.dataset.key] = el.value })
    if (map.label || map.image) maps.push(map)
  })

  // Collect list fields
  const collectList = (type) => {
    const items = []
    document.querySelectorAll(`[data-listtype="${type}"]`).forEach(el => {
      if (el.value.trim()) items.push(el.value.trim())
    })
    return items
  }

  const obj = {
    ...base,
    poster: v('f-poster') || undefined,
    resultsUrl: v('f-resultsUrl') || undefined,
    summary: v('f-summary') || undefined,
    races: races.length ? races : undefined,
    course: {
      description: v('f-courseDesc') || undefined,
      maps: maps.length ? maps : undefined,
    },
    registration: {
      feeNote: v('f-feeNote') || undefined,
      deadline: v('f-deadline') || undefined,
      notes: collectList('note').length ? collectList('note') : undefined,
    },
    rules: collectList('rule').length ? collectList('rule') : undefined,
    prizes: collectList('prize').length ? collectList('prize') : undefined,
    locationDetails: {
      address: v('f-address') || undefined,
      parking: v('f-parking') || undefined,
      mapQuery: v('f-mapQuery') || undefined,
    },
  }

  // Clean up empty nested objects
  if (!obj.course.description && !obj.course.maps) obj.course = undefined
  if (!obj.registration.feeNote && !obj.registration.deadline && !obj.registration.notes) obj.registration = undefined
  if (!obj.locationDetails.address && !obj.locationDetails.parking && !obj.locationDetails.mapQuery) obj.locationDetails = undefined

  return JSON.parse(JSON.stringify(obj)) // strip undefined
}

// ────────────────────────────────────────────────
// Save
// ────────────────────────────────────────────────
function saveEvent() {
  const data = collectForm()
  if (!data.id || !data.name || !data.date) {
    toast('Name, ID and date are required', 'err')
    return
  }

  currentList()[currentIdx] = data
  renderSidebar()

  // Build full updated JSON and show download
  const fullJson = JSON.stringify(currentList(), null, 2)
  const filename = tab === 'events' ? 'events.json' : 'partners.json'
  downloadJson(fullJson, filename)
  document.getElementById('save-status').textContent = `✓ ${filename} downloaded`
  document.getElementById('save-status').className = 'save-status ok'
  toast(`Saved — replace src/data/${filename} with the downloaded file`, 'ok')

  // Update raw viewer if open
  const raw = document.getElementById('raw-pre')
  if (raw) raw.textContent = JSON.stringify(data, null, 2)
}

function copyEvent() {
  if (currentIdx === null) return

  // Deep clone the current event so we don't mutate the original
  const source = JSON.parse(JSON.stringify(currentList()[currentIdx]))

  // Clear the fields that change year-on-year — keep everything else
  // (races, course, rules, prizes, location, summary all stay intact)
  const copied = {
    ...source,
    id: '',           // must be unique — user fills in
    date: '',         // new race date
    startTime: source.startTime || '09:00',
    image: '',        // new race image
    poster: '',       // new race poster
    bookingUrl: '',   // new entry link
    resultsUrl: '',   // new results link (not available yet)
  }

  // Increment year in name if it contains one, so it's clear this is a copy
  // e.g. "Hitchin 10km 2026" → "Hitchin 10km 2027"
  const yearMatch = copied.name.match(/\b(20\d{2})\b/)
  if (yearMatch) {
    const nextYear = parseInt(yearMatch[1]) + 1
    copied.name = copied.name.replace(yearMatch[1], nextYear)
  }

  // Clear year references in registration deadline (prevent stale info showing)
  if (copied.registration && copied.registration.deadline) {
    copied.registration = { ...copied.registration, deadline: '' }
  }

  currentList().push(copied)
  currentIdx = currentList().length - 1
  renderSidebar()
  renderForm(copied)
  toast('Copied — update the date, ID and image, then save', 'ok')
}

function downloadAll() {
  const filename = tab === 'events' ? 'events.json' : 'partners.json'
  downloadJson(JSON.stringify(currentList(), null, 2), filename)
  toast(`${filename} exported`, 'ok')
}

function deleteEvent() {
  if (!confirm(`Delete "${currentList()[currentIdx]?.name}"? This can't be undone.`)) return
  currentList().splice(currentIdx, 1)
  currentIdx = null
  document.getElementById('form-wrapper').style.display = 'none'
  document.getElementById('placeholder').style.display = 'flex'
  renderSidebar()

  // Download the updated file immediately
  const fullJson = JSON.stringify(currentList(), null, 2)
  const filename = tab === 'events' ? 'events.json' : 'partners.json'
  downloadJson(fullJson, filename)
  toast(`Deleted — replace src/data/${filename} with the downloaded file`, 'ok')
}

function downloadJson(json, filename) {
  const blob = new Blob([json], { type: 'application/json' })
  const url = URL.createObjectURL(blob)
  const a = document.createElement('a')
  a.href = url; a.download = filename; a.click()
  URL.revokeObjectURL(url)
}

// ────────────────────────────────────────────────
// Raw JSON viewer
// ────────────────────────────────────────────────
function toggleRaw() {
  const viewer = document.getElementById('raw-viewer')
  const btn = document.querySelector('.raw-toggle')
  if (viewer.style.display === 'none') {
    viewer.style.display = 'block'
    document.getElementById('raw-pre').textContent = JSON.stringify(collectForm(), null, 2)
    btn.textContent = '▼ Hide JSON'
  } else {
    viewer.style.display = 'none'
    btn.textContent = '▶ Show generated JSON'
  }
}

// ────────────────────────────────────────────────
// Toast
// ────────────────────────────────────────────────
function toast(msg, type = 'ok') {
  const el = document.getElementById('toast')
  el.textContent = msg
  el.className = `toast ${type} show`
  clearTimeout(el._t)
  el._t = setTimeout(() => { el.className = 'toast' }, 3500)
}

// ────────────────────────────────────────────────
// Helpers
// ────────────────────────────────────────────────
function esc(s) {
  if (!s) return ''
  return String(s)
    .replace(/&/g,'&amp;').replace(/"/g,'&quot;')
    .replace(/</g,'&lt;').replace(/>/g,'&gt;')
}

// ────────────────────────────────────────────────
// Boot
// ────────────────────────────────────────────────
loadData()
</script>
